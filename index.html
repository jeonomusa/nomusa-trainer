<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노무사 아웃풋 트레이너</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; padding: 30px 0; color: #333; }
        .input-box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; resize: vertical; }
        button { width: 100%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        button:hover { background: #45a049; }
        .result-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; }
        .result-box h2 { margin-bottom: 15px; color: #333; }
        .result-content { line-height: 1.8; color: #555; white-space: pre-wrap; }
        .loading { text-align: center; padding: 20px; color: #888; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚖️ 노무사 아웃풋 트레이너</h1>
        <div class="input-box">
            <textarea id="question" placeholder="노무 관련 질문을 입력하세요..."></textarea>
            <br><br>
            <button onclick="getAnswer()">답변 받기</button>
        </div>
        <div class="loading" id="loading">⏳ 답변 생성 중...</div>
        <div class="result-box" id="result">
            <h2>📋 답변</h2>
            <div class="result-content" id="result-content"></div>
        </div>
    </div>
    <script>
        async function getAnswer() {
            const question = document.getElementById('question').value;
            if (!question.trim()) { alert('질문을 입력해주세요!'); return; }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            const API_KEY = 'AIzaSyApB5J0IXoab-iYRyosBvdLkdTDeEWAW5I';
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `당신은 노무사 시험 전문 트레이너입니다. 다음 질문에 대해 노무사 시험 답안 형식으로 답변해주세요:\n\n${question}` }] }]
                })
            });
            
            const data = await response.json();
            const answer = data.candidates[0].content.parts[0].text;
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-content').textContent = answer;
        }
    </script>
</body>
</html>
